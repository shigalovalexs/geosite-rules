name: Update Rules and Compile SRS

on:
  schedule:
    # Запуск каждый день в 00:00 UTC (раз в сутки)
    - cron: '0 0 * * *'
  workflow_dispatch: # Позволяет при желании запустить сборку вручную кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install sing-box
        run: |
          # Автоматическая установка официального sing-box на сервер сборки Ubuntu
          bash <(curl -fsSL https://sing-box.app/install.sh)

      - name: Run script to merge and compile
        run: python merge_and_compile.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxy_a_rules.json proxy_a_rules.srs proxy_b_rules.json proxy_b_rules.srs
          git commit -m "Auto-update: rules merged and compiled to SRS" || echo "No changes to commit"
          git push